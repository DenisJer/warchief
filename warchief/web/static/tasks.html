<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warchief — Tasks</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
  a { color: #FFD100; text-decoration: none; }
  .header { background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); border-bottom: 3px solid #8C1616; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { color: #FFD100; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }
  nav { display: flex; gap: 8px; font-size: 13px; }
  nav a { color: #888; padding-bottom: 2px; }
  nav a.active { color: #FFD100; border-bottom: 2px solid #FFD100; }

  .content { padding: 16px 24px; max-width: 1200px; margin: 0 auto; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { background: #16213e; border: 1px solid #2a2a4a; color: #888; padding: 5px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; }
  .filter-btn:hover { border-color: #FFD100; }
  .filter-btn.active { border-color: #FFD100; color: #FFD100; background: #1a2a1a; }

  /* Task row */
  .task-row { background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
  .task-row:hover { border-color: #444; }
  .task-header { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .task-header:hover { background: #1a2a3e; }
  .task-expand { color: #555; font-size: 12px; min-width: 16px; }
  .task-id { color: #FFD100; font-weight: bold; font-size: 12px; min-width: 80px; }
  .task-title { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta-row { display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
  .badge-open { background: #1a5276; color: #85c1e9; }
  .badge-in_progress { background: #1e6e3e; color: #82e0aa; }
  .badge-blocked { background: #8C1616; color: #f1948a; }
  .badge-closed { background: #333; color: #888; }
  .badge-type { background: #2a2a4a; color: #aaa; }
  .badge-cost { background: #0f0f23; color: #FFD100; }

  /* Expanded detail */
  .task-detail { display: none; padding: 0 16px 16px; border-top: 1px solid #2a2a4a; }
  .task-detail.open { display: block; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

  .detail-card { background: #0f0f23; border-radius: 4px; padding: 10px 12px; }
  .detail-card h4 { color: #FFD100; font-size: 11px; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
  .detail-card p { font-size: 12px; color: #ccc; line-height: 1.5; }

  /* Timeline */
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: #2a2a4a; }
  .timeline-item { position: relative; margin-bottom: 8px; font-size: 12px; }
  .timeline-item::before { content: ''; position: absolute; left: -17px; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: #2a2a4a; }
  .timeline-item.spawn::before { background: #82e0aa; }
  .timeline-item.advance::before { background: #85c1e9; }
  .timeline-item.block::before { background: #f1948a; }
  .timeline-item.reject::before { background: #f0b27a; }
  .timeline-item.comment::before { background: #FFD100; }
  .timeline-item .tl-age { color: #555; min-width: 50px; display: inline-block; }
  .timeline-item .tl-type { font-weight: bold; min-width: 70px; display: inline-block; }
  .timeline-item .tl-detail { color: #888; }

  /* Scratchpad */
  .scratchpad-box { background: #0a0a1a; border-radius: 4px; padding: 10px 12px; font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; color: #ccc; max-height: 200px; overflow-y: auto; }

  /* Messages */
  .msg-item { padding: 4px 0; font-size: 12px; border-bottom: 1px solid #1a1a2e; }
  .msg-type { font-weight: bold; font-size: 10px; text-transform: uppercase; }
  .msg-question { color: #FFD100; }
  .msg-answer { color: #82e0aa; }
  .msg-feedback { color: #85c1e9; }
  .msg-rejection { color: #f1948a; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f0f23; }
  ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:16px">
    <h1>Warchief</h1>
    <span id="projectName" style="color:#85c1e9;font-size:13px;font-weight:normal"></span>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/agents">Agents</a>
      <a href="/tasks" class="active">Tasks</a>
    </nav>
  </div>
  <div style="font-size:13px;color:#888">
    <span id="taskCount">0</span> tasks
  </div>
</div>

<div class="content">
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn" onclick="setFilter('open')">Open</button>
    <button class="filter-btn" onclick="setFilter('in_progress')">In Progress</button>
    <button class="filter-btn" onclick="setFilter('blocked')">Blocked</button>
    <button class="filter-btn" onclick="setFilter('closed')">Closed</button>
  </div>
  <div id="taskList"></div>
</div>

<script>
  let tasks = [];
  let filter = 'all';

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.textContent.toLowerCase().replace(' ', '_') === f || (f === 'all' && btn.textContent === 'All'));
    });
    renderTasks();
  }

  function toggleDetail(id) {
    var el = document.getElementById('detail-' + id);
    if (el) el.classList.toggle('open');
    var arrow = document.getElementById('arrow-' + id);
    if (arrow) arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
  }

  function renderTasks() {
    var filtered = filter === 'all' ? tasks : tasks.filter(function(t) { return t.status === filter; });
    document.getElementById('taskCount').textContent = filtered.length + '/' + tasks.length;

    if (!filtered.length) {
      document.getElementById('taskList').innerHTML = '<div style="text-align:center;color:#555;padding:40px;font-style:italic">No tasks found</div>';
      return;
    }

    document.getElementById('taskList').innerHTML = filtered.map(function(t) {
      var statusCls = 'badge badge-' + t.status;
      var costStr = t.cost > 0 ? '$' + t.cost.toFixed(2) : '';

      // Timeline
      var timeline = t.events.map(function(e) {
        var cls = 'timeline-item ' + e.type;
        var detail = '';
        if (e.from_stage && e.to_stage) detail = e.from_stage + ' → ' + e.to_stage;
        else if (e.reason) detail = e.reason;
        else if (e.comment) detail = e.comment.substring(0, 80);
        else if (e.agent) detail = e.agent;
        return '<div class="' + cls + '"><span class="tl-age">' + esc(e.age) + '</span>' +
          '<span class="tl-type">' + esc(e.type) + '</span>' +
          '<span class="tl-detail">' + esc(detail) + '</span></div>';
      }).join('');

      // Messages
      var messages = t.messages.map(function(m) {
        var cls = 'msg-type msg-' + m.type;
        return '<div class="msg-item"><span class="' + cls + '">' + esc(m.type) + '</span> ' +
          '<span style="color:#888">' + esc(m.from || '') + '</span> ' +
          esc(m.body) + '</div>';
      }).join('');

      return '<div class="task-row">' +
        '<div class="task-header" onclick="toggleDetail(\'' + esc(t.id) + '\')">' +
          '<span class="task-expand" id="arrow-' + esc(t.id) + '">▶</span>' +
          '<span class="task-id">' + esc(t.id) + '</span>' +
          '<span class="task-title">' + esc(t.title) + '</span>' +
          '<div class="task-meta-row">' +
            '<span class="' + statusCls + '">' + esc(t.status) + '</span>' +
            (t.stage ? '<span class="badge badge-type">' + esc(t.stage) + '</span>' : '') +
            '<span class="badge badge-type">' + esc(t.type) + '</span>' +
            (costStr ? '<span class="badge badge-cost">' + costStr + '</span>' : '') +
            '<span style="color:#555;font-size:11px">' + esc(t.created) + ' ago</span>' +
          '</div>' +
        '</div>' +
        '<div class="task-detail" id="detail-' + esc(t.id) + '">' +
          '<div class="detail-grid">' +
            '<div class="detail-card">' +
              '<h4>Details</h4>' +
              '<p>' + (t.description ? esc(t.description) : '<em style="color:#555">No description</em>') + '</p>' +
              '<p style="margin-top:8px;font-size:11px;color:#888">' +
                'Priority: ' + t.priority + ' | Spawns: ' + t.spawns + ' | Rejections: ' + t.rejections + ' | Crashes: ' + t.crashes +
                (t.budget ? ' | Budget: $' + t.budget.toFixed(2) : '') +
              '</p>' +
              (t.labels.length ? '<p style="margin-top:6px">' + t.labels.map(function(l) { return '<span class="badge badge-type" style="margin-right:4px">' + esc(l) + '</span>'; }).join('') + '</p>' : '') +
            '</div>' +
            '<div class="detail-card">' +
              '<h4>Timeline (' + t.events.length + ' events)</h4>' +
              (timeline ? '<div class="timeline">' + timeline + '</div>' : '<p style="color:#555;font-style:italic">No events</p>') +
            '</div>' +
          '</div>' +
          (t.scratchpad ? '<div class="detail-card" style="margin-bottom:12px"><h4>Agent Notes</h4><div class="scratchpad-box">' + esc(t.scratchpad) + '</div></div>' : '') +
          (messages ? '<div class="detail-card"><h4>Messages</h4>' + messages + '</div>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  async function loadTasks() {
    try {
      var resp = await fetch('/api/tasks');
      tasks = await resp.json();
      renderTasks();
    } catch(e) { console.error('Failed to load tasks', e); }
  }

  // Project name
  fetch('/api/state').then(function(r){return r.json()}).then(function(s){
    if(s.project){
      document.getElementById('projectName').textContent=s.project;
      document.title='Warchief — '+s.project+' — Tasks';
    }
  }).catch(function(){});

  loadTasks();
  setInterval(loadTasks, 10000);
</script>
</body>
</html>
