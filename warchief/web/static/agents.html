<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warchief — Agents</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
    border-bottom: 3px solid #8C1616;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { color: #FFD100; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }
  a { color: #FFD100; text-decoration: none; }
  nav { display: flex; gap: 8px; font-size: 13px; }
  nav a { color: #888; padding-bottom: 2px; }
  nav a.active { color: #FFD100; border-bottom: 2px solid #FFD100; }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Agent list sidebar */
  .agent-list {
    width: 320px;
    border-right: 1px solid #2a2a4a;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .agent-list-header {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: bold;
    color: #FFD100;
    text-transform: uppercase;
    border-bottom: 1px solid #2a2a4a;
    background: #0f0f23;
    position: sticky;
    top: 0;
  }
  .agent-item {
    padding: 10px 14px;
    border-bottom: 1px solid #1a1a2e;
    cursor: pointer;
    transition: background 0.15s;
  }
  .agent-item:hover { background: #16213e; }
  .agent-item.selected { background: #16213e; border-left: 3px solid #FFD100; }
  .agent-item .agent-name {
    font-weight: bold;
    font-size: 13px;
    color: #FFD100;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .agent-item .agent-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #888;
    margin-top: 3px;
  }
  .agent-item .agent-role { color: #85c1e9; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .status-alive { background: #82e0aa; }
  .status-dead { background: #555; }
  .status-zombie { background: #f1948a; }

  /* Log viewer */
  .log-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .log-header {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: bold;
    color: #FFD100;
    text-transform: uppercase;
    border-bottom: 1px solid #2a2a4a;
    background: #0f0f23;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .log-header .log-info { font-size: 11px; color: #888; font-weight: normal; text-transform: none; }
  .log-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    background: #0a0a1a;
  }
  .log-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #555;
    font-style: italic;
  }

  /* Log line coloring */
  .log-line-error { color: #f1948a; }
  .log-line-warning { color: #f0b27a; }
  .log-line-success { color: #82e0aa; }
  .log-line-tool { color: #85c1e9; }
  .log-line-dim { color: #555; }

  /* Auto-follow toggle */
  .toggle-btn {
    background: #2a2a4a;
    border: 1px solid #444;
    color: #ccc;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 11px;
    cursor: pointer;
  }
  .toggle-btn.active { border-color: #82e0aa; color: #82e0aa; }
  .toggle-btn:hover { border-color: #FFD100; }

  /* File path links in log */
  .file-link { color: #FFD100; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
  .file-link:hover { color: #fff; }
  .diff-link { color: #82e0aa; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; font-size: 10px; margin-left: 6px; }
  .diff-link:hover { color: #fff; }

  /* Diff coloring */
  .diff-add { color: #82e0aa; background: rgba(130,224,170,0.08); }
  .diff-del { color: #f1948a; background: rgba(241,148,138,0.08); }
  .diff-hunk { color: #85c1e9; font-weight: bold; }
  .diff-meta { color: #888; }

  /* File viewer overlay */
  .file-overlay {
    display: none;
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 55%;
    background: #0a0a1a;
    border-left: 2px solid #8C1616;
    z-index: 100;
    flex-direction: column;
  }
  .file-overlay.active { display: flex; }
  .file-overlay-header {
    padding: 10px 14px;
    background: #0f0f23;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .file-overlay-header .file-path { color: #FFD100; font-size: 12px; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-overlay-header .file-close { background: #2a2a4a; border: 1px solid #444; color: #ccc; padding: 3px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
  .file-overlay-header .file-close:hover { border-color: #8C1616; color: #f1948a; }
  .file-overlay-content {
    flex: 1;
    overflow: auto;
    padding: 12px 16px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre;
    color: #e0e0e0;
  }
  .file-overlay-error { color: #f1948a; padding: 20px; text-align: center; }
  .file-line-num { color: #555; display: inline-block; width: 45px; text-align: right; margin-right: 12px; user-select: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f0f23; }
  ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:16px">
    <h1>Warchief</h1>
    <span id="projectName" style="color:#85c1e9;font-size:13px;font-weight:normal" title=""></span>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/agents" class="active">Agents</a>
    </nav>
  </div>
  <div style="font-size:13px;color:#888">
    <span id="activeCount" style="color:#82e0aa">0</span> active &nbsp;|&nbsp; <span id="historyCount">0</span> history
  </div>
</div>

<div class="main">
  <div class="agent-list">
    <div class="agent-list-header">Agents</div>
    <div id="agentListBody"></div>
  </div>
  <div class="log-panel">
    <div class="log-header">
      <span id="logTitle">Select an agent</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="log-info" id="logInfo"></span>
        <button class="toggle-btn active" id="autoFollowBtn" onclick="toggleAutoFollow()">Auto-follow</button>
        <button class="toggle-btn" onclick="refreshLog()">Refresh</button>
      </div>
    </div>
    <div class="log-content" id="logContent">
      <div class="log-empty">Select an agent from the list to view its output</div>
    </div>
  </div>
</div>

<!-- File viewer overlay -->
<div class="file-overlay" id="fileOverlay">
  <div class="file-overlay-header">
    <span class="file-path" id="fileOverlayPath"></span>
    <button class="file-close" onclick="closeFileViewer()">Close (Esc)</button>
  </div>
  <div class="file-overlay-content" id="fileOverlayContent"></div>
</div>

<script>
  let selectedAgent = null;
  let autoFollow = true;
  let userScrolledUp = false;
  let lastLogHash = '';
  let pollTimer = null;
  let agents = [];

  // Detect when user scrolls up in log — pause auto-follow
  document.getElementById('logContent').addEventListener('scroll', function() {
    var el = this;
    var atBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 30;
    if (!atBottom && !userScrolledUp) {
      userScrolledUp = true;
      autoFollow = false;
      document.getElementById('autoFollowBtn').classList.remove('active');
    } else if (atBottom && userScrolledUp) {
      userScrolledUp = false;
      autoFollow = true;
      document.getElementById('autoFollowBtn').classList.add('active');
    }
  });

  function statusClass(s) {
    return 'status-' + (s || 'dead');
  }

  function colorLogLine(line) {
    if (/error|fail|exception|traceback/i.test(line)) return 'log-line-error';
    if (/warn/i.test(line)) return 'log-line-warning';
    if (/success|pass|done|complete/i.test(line)) return 'log-line-success';
    if (/^(Reading|Glob|Grep|Edit|Write|Bash):/i.test(line)) return 'log-line-tool';
    if (/^\s*\d+[→|]/.test(line)) return 'log-line-dim';
    return '';
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  async function loadAgents() {
    try {
      var resp = await fetch('/api/agents');
      agents = await resp.json();
      renderAgentList();

      // Auto-select newest alive agent if none selected
      if (!selectedAgent && agents.length) {
        var alive = agents.filter(function(a) { return a.status === 'alive'; });
        if (alive.length) selectAgent(alive[0].id);
        else selectAgent(agents[0].id);
      }
    } catch(e) { console.error('Failed to load agents', e); }
  }

  let showHistory = false;

  function renderAgentItem(a) {
    var sel = a.id === selectedAgent ? ' selected' : '';
    return '<div class="agent-item' + sel + '" onclick="selectAgent(\'' + esc(a.id) + '\')">' +
      '<div class="agent-name"><span class="status-dot ' + statusClass(a.status) + '"></span>' + esc(a.id) + '</div>' +
      '<div class="agent-meta">' +
        '<span class="agent-role">' + esc(a.role) + '</span>' +
        '<span>' + esc(a.task || 'idle') + '</span>' +
        '<span>' + esc(a.age) + '</span>' +
      '</div>' +
    '</div>';
  }

  function renderAgentList() {
    var body = document.getElementById('agentListBody');
    var active = agents.filter(function(a) { return a.status === 'alive' || a.status === 'zombie'; });
    var history = agents.filter(function(a) { return a.status !== 'alive' && a.status !== 'zombie'; });

    document.getElementById('activeCount').textContent = active.length;
    document.getElementById('historyCount').textContent = history.length;

    if (!agents.length) {
      body.innerHTML = '<div style="padding:20px;color:#555;text-align:center;font-style:italic">No agents yet</div>';
      return;
    }

    var html = '';

    // Active section
    html += '<div class="agent-list-header" style="background:#0a2a0a;color:#82e0aa">Active (' + active.length + ')</div>';
    if (active.length) {
      html += active.map(renderAgentItem).join('');
    } else {
      html += '<div style="padding:12px 14px;color:#555;font-size:12px;font-style:italic">No active agents</div>';
    }

    // History section
    html += '<div class="agent-list-header" style="cursor:pointer;user-select:none" onclick="toggleHistory()">' +
      '<span style="margin-right:6px">' + (showHistory ? '▼' : '▶') + '</span>History (' + history.length + ')</div>';
    if (showHistory) {
      html += history.map(renderAgentItem).join('');
    }

    body.innerHTML = html;
  }

  function toggleHistory() {
    showHistory = !showHistory;
    renderAgentList();
  }

  function selectAgent(agentId) {
    selectedAgent = agentId;
    renderAgentList();
    var agent = agents.find(function(a) { return a.id === agentId; });
    document.getElementById('logTitle').textContent = agentId;
    document.getElementById('logInfo').textContent = agent ? agent.role + ' → ' + (agent.task || 'idle') + ' | ' + (agent.model || '') : '';
    refreshLog();
  }

  async function refreshLog() {
    if (!selectedAgent) return;
    try {
      var resp = await fetch('/api/agent-log/' + encodeURIComponent(selectedAgent) + '?lines=500');
      var data = await resp.json();
      var content = document.getElementById('logContent');
      if (!data.exists || !data.lines.length) {
        content.innerHTML = '<div class="log-empty">No log output yet</div>';
        return;
      }
      // Only update DOM if content changed (avoids scroll reset)
      var newHash = data.total + ':' + data.lines[data.lines.length - 1];
      if (newHash === lastLogHash) return;
      lastLogHash = newHash;

      var scrollPos = content.scrollTop;
      content.innerHTML = data.lines.map(function(line) {
        var cls = colorLogLine(line);
        var escaped = esc(line);
        // Make file paths clickable (matches /path/to/file.ext patterns)
        escaped = escaped.replace(/(\/[\w.\-\/]+\.warchief-worktrees\/[^\s,)'"]+)/g, function(match) {
          var links = '<span class="file-link" onclick="viewFile(\'' + match.replace(/'/g, "\\'") + '\')">' + match + '</span>';
          links += '<span class="diff-link" onclick="viewDiff(\'' + match.replace(/'/g, "\\'") + '\')">[diff]</span>';
          return links;
        });
        return cls ? '<span class="' + cls + '">' + escaped + '</span>' : escaped;
      }).join('\n');
      if (autoFollow) {
        content.scrollTop = content.scrollHeight;
      } else {
        content.scrollTop = scrollPos;
      }
      document.getElementById('logInfo').innerHTML = (document.getElementById('logInfo').textContent.split('|')[0] || '') + '| ' + data.total + ' lines';
    } catch(e) { console.error('Failed to load log', e); }
  }

  function toggleAutoFollow() {
    autoFollow = !autoFollow;
    var btn = document.getElementById('autoFollowBtn');
    btn.classList.toggle('active', autoFollow);
    if (autoFollow) {
      var content = document.getElementById('logContent');
      content.scrollTop = content.scrollHeight;
    }
  }

  // Poll
  async function poll() {
    await loadAgents();
    if (selectedAgent) await refreshLog();
  }

  // File viewer
  async function viewFile(filePath) {
    document.getElementById('fileOverlayPath').textContent = filePath;
    document.getElementById('fileOverlayContent').innerHTML = '<div style="color:#888;padding:20px">Loading...</div>';
    document.getElementById('fileOverlay').classList.add('active');

    try {
      var resp = await fetch('/api/agent-file?path=' + encodeURIComponent(filePath));
      var data = await resp.json();
      if (data.error) {
        document.getElementById('fileOverlayContent').innerHTML = '<div class="file-overlay-error">' + esc(data.error) + '</div>';
        return;
      }
      var lines = data.content.split('\n');
      document.getElementById('fileOverlayContent').innerHTML = lines.map(function(line, i) {
        return '<span class="file-line-num">' + (i + 1) + '</span>' + esc(line);
      }).join('\n');
    } catch(e) {
      document.getElementById('fileOverlayContent').innerHTML = '<div class="file-overlay-error">Failed to load file: ' + esc(e.message) + '</div>';
    }
  }

  async function viewDiff(filePath) {
    document.getElementById('fileOverlayPath').textContent = 'Diff: ' + filePath;
    document.getElementById('fileOverlayContent').innerHTML = '<div style="color:#888;padding:20px">Loading diff...</div>';
    document.getElementById('fileOverlay').classList.add('active');

    try {
      var resp = await fetch('/api/agent-diff?path=' + encodeURIComponent(filePath));
      var data = await resp.json();
      if (data.error) {
        document.getElementById('fileOverlayContent').innerHTML = '<div class="file-overlay-error">' + esc(data.error) + '</div>';
        return;
      }
      var diffText = data.diff || '';
      if (!diffText) {
        document.getElementById('fileOverlayContent').innerHTML = '<div class="file-overlay-error">No diff available — file may not exist or worktree was cleaned up</div>';
        return;
      }
      var lines = diffText.split('\n');
      document.getElementById('fileOverlayContent').innerHTML = lines.map(function(line) {
        var cls = '';
        if (line.startsWith('+') && !line.startsWith('+++')) cls = 'diff-add';
        else if (line.startsWith('-') && !line.startsWith('---')) cls = 'diff-del';
        else if (line.startsWith('@@')) cls = 'diff-hunk';
        else if (line.startsWith('diff ') || line.startsWith('index ') || line.startsWith('---') || line.startsWith('+++')) cls = 'diff-meta';
        return cls ? '<span class="' + cls + '">' + esc(line) + '</span>' : esc(line);
      }).join('\n');
    } catch(e) {
      document.getElementById('fileOverlayContent').innerHTML = '<div class="file-overlay-error">Failed: ' + esc(e.message) + '</div>';
    }
  }

  function closeFileViewer() {
    document.getElementById('fileOverlay').classList.remove('active');
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeFileViewer();
  });

  // Load project name
  fetch('/api/state').then(function(r){return r.json()}).then(function(s){
    if(s.project){
      document.getElementById('projectName').textContent=s.project;
      document.getElementById('projectName').title=s.project_path||'';
      document.title='Warchief — '+s.project+' — Agents';
    }
  }).catch(function(){});

  // Check URL hash for pre-selected agent (from dashboard "logs" button)
  if (window.location.hash) {
    selectedAgent = window.location.hash.substring(1);
  }

  // Initial load + poll every 3s
  poll();
  pollTimer = setInterval(poll, 3000);
</script>
</body>
</html>
