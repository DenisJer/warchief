[identity]
name = "conductor"
prompt_file = "prompts/conductor.md"
max_concurrent = 1
description = "The Warchief's strategist. Plans work, creates tasks, handles escalations."

[model]
default = "claude-opus-4-6"
max_turns = 20

[permissions]
allowed_tools = ["Bash", "Edit", "Write", "Read", "Glob", "Grep", "WebSearch", "Agent"]
disallowed_bash_commands = ["rm -rf /", "sudo rm", "chmod 777", "mkfs"]

[health]
timeout_seconds = 7200
max_crashes = 5
max_rejections = 0
max_total_spawns = 10

[worktree]
type = "none"
