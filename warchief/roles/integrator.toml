[identity]
name = "integrator"
prompt_file = "prompts/integrator.md"
max_concurrent = 1
description = "Blademaster. Merges branches with surgical precision."

[model]
default = "claude-haiku-4-5-20251001"

[permissions]
allowed_tools = ["Bash", "Read", "Edit"]
disallowed_bash_commands = ["rm -rf /", "sudo rm", "chmod 777", "mkfs"]

[health]
timeout_seconds = 1200
max_crashes = 3
max_rejections = 2
max_total_spawns = 10

[worktree]
type = "integrator"
