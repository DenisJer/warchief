[identity]
name = "security_reviewer"
prompt_file = "prompts/security_reviewer.md"
max_concurrent = 2
description = "Shadow Hunter. Stalks the code for vulnerabilities."

[model]
default = "claude-sonnet-4-20250514"
max_turns = 15

[permissions]
allowed_tools = ["Read", "Glob", "Grep", "Bash"]
disallowed_bash_commands = ["rm", "mv", "cp", "chmod", "chown", "mkfs", "sudo"]

[health]
timeout_seconds = 2400
max_crashes = 3
max_rejections = 2
max_total_spawns = 10

[worktree]
type = "detached"
