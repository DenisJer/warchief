[identity]
name = "challenger"
prompt_file = "prompts/challenger.md"
max_concurrent = 2
description = "Dark Ranger. Stress-tests code and findings from the shadows — finds what others miss."

[model]
default = "claude-opus-4-6"
max_turns = 20

[permissions]
allowed_tools = ["Read", "Glob", "Grep", "WebSearch", "Bash"]
disallowed_bash_commands = ["rm -rf /", "sudo rm", "chmod 777", "mkfs"]

[health]
timeout_seconds = 3600
max_crashes = 3
max_rejections = 2
max_total_spawns = 10

[worktree]
type = "detached"
