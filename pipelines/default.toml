[metadata]
name = "default"
description = "Standard development pipeline: plan -> develop -> test -> review -> create PR"

[stages]
planning = { role = "planner", priority = 8 }
development = { role = "developer", priority = 6 }
testing = { role = "tester", priority = 5 }
reviewing = { role = "reviewer", priority = 4 }
security-review = { role = "security_reviewer", priority = 3, requires_label = "security" }
pr-creation = { role = "pr_creator", priority = 2 }

[pipelines]
feature = ["planning", "development", "testing", "reviewing", "security-review", "pr-creation"]
bug = ["development", "testing", "reviewing", "pr-creation"]

[routing]
security = { insert_stage = "security-review", after = "reviewing" }
frontend = { prompt_block = "visual_verification" }

[defaults]
max_spawns_per_cycle = 2
poll_interval_seconds = 5
rejection_cooldown_seconds = 60
